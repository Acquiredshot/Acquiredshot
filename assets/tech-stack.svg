<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="techHeaderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a9fef7"/>
      <stop offset="50%" style="stop-color:#bf91f3"/>
      <stop offset="100%" style="stop-color:#70a5fd"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="techBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf91f3;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#a9fef7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#70a5fd;stop-opacity:0.5"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="techScan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bf91f3;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#bf91f3;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#bf91f3;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#0d1117"/>
  <rect width="800" height="520" rx="16" fill="none" stroke="url(#techBorder)" stroke-width="2"/>

  <!-- Scanning line -->
  <rect x="0" y="0" width="800" height="60" fill="url(#techScan)" rx="16">
    <animateTransform attributeName="transform" type="translate" values="0,-60;0,520" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="725" cy="35" r="2" fill="#a9fef7" opacity="0.4">
    <animate attributeName="cy" values="35;22;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="50" r="1.5" fill="#bf91f3" opacity="0.4">
    <animate attributeName="cy" values="50;38;50" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="28" r="1" fill="#70a5fd" opacity="0.4">
    <animate attributeName="cy" values="28;18;28" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.1s" fill="freeze"/>
    <text x="50" y="50" font-size="26" font-weight="bold" fill="url(#techHeaderGrad)" font-family="Segoe UI, Ubuntu, sans-serif" filter="url(#glow)">Tech Stack</text>
  </g>

  <!-- Animated underline -->
  <line x1="50" y1="65" x2="50" y2="65" stroke="url(#techHeaderGrad)" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x2" from="50" to="280" dur="1s" begin="0.3s" fill="freeze"/>
  </line>

  <!-- Section: Languages & Frameworks -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.7" dur="0.5s" begin="0.5s" fill="freeze"/>
    <text x="50" y="100" font-size="13" font-weight="bold" fill="#a9fef7" font-family="Segoe UI, Ubuntu, sans-serif">Languages &amp; Frameworks</text>
    <line x1="50" y1="108" x2="220" y2="108" stroke="#38bdae" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Row 1 icons: Python, JavaScript, TypeScript, React, Node.js -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.6s" fill="freeze"/>

    <!-- Python -->
    <rect x="50" y="120" width="120" height="55" rx="10" fill="#1a1b27" stroke="#3572A5" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="75" cy="147" r="8" fill="#3572A5">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="151" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Python</text>

    <!-- JavaScript -->
    <rect x="185" y="120" width="120" height="55" rx="10" fill="#1a1b27" stroke="#f1e05a" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <circle cx="210" cy="147" r="8" fill="#f1e05a">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <text x="225" y="151" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">JavaScript</text>

    <!-- TypeScript -->
    <rect x="320" y="120" width="120" height="55" rx="10" fill="#1a1b27" stroke="#3178c6" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <circle cx="345" cy="147" r="8" fill="#3178c6">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <text x="360" y="151" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">TypeScript</text>

    <!-- React -->
    <rect x="455" y="120" width="120" height="55" rx="10" fill="#1a1b27" stroke="#61dafb" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <circle cx="480" cy="147" r="8" fill="#61dafb">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text x="495" y="151" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">React</text>

    <!-- Node.js -->
    <rect x="590" y="120" width="120" height="55" rx="10" fill="#1a1b27" stroke="#339933" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <circle cx="615" cy="147" r="8" fill="#339933">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <text x="630" y="151" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Node.js</text>
  </g>

  <!-- Row 2: HTML, CSS, Git, GitHub, VS Code -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>

    <rect x="50" y="190" width="120" height="55" rx="10" fill="#1a1b27" stroke="#e34c26" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <circle cx="75" cy="217" r="8" fill="#e34c26">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="90" y="221" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">HTML</text>

    <rect x="185" y="190" width="120" height="55" rx="10" fill="#1a1b27" stroke="#563d7c" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <circle cx="210" cy="217" r="8" fill="#563d7c">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <text x="225" y="221" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">CSS</text>

    <rect x="320" y="190" width="120" height="55" rx="10" fill="#1a1b27" stroke="#F05032" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
    <circle cx="345" cy="217" r="8" fill="#F05032">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <text x="360" y="221" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Git</text>

    <rect x="455" y="190" width="120" height="55" rx="10" fill="#1a1b27" stroke="#c0caf5" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
    <circle cx="480" cy="217" r="8" fill="#c0caf5">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="1.6s"/>
    </circle>
    <text x="495" y="221" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">GitHub</text>

    <rect x="590" y="190" width="120" height="55" rx="10" fill="#1a1b27" stroke="#007ACC" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="1.4s"/>
    </rect>
    <circle cx="615" cy="217" r="8" fill="#007ACC">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    <text x="630" y="221" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">VS Code</text>
  </g>

  <!-- Section: DevOps & Infrastructure -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.7" dur="0.5s" begin="1.2s" fill="freeze"/>
    <text x="50" y="280" font-size="13" font-weight="bold" fill="#bf91f3" font-family="Segoe UI, Ubuntu, sans-serif">DevOps &amp; Infrastructure</text>
    <line x1="50" y1="288" x2="240" y2="288" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Row 3: Docker, Kubernetes, AWS, MongoDB, Postgres -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.3s" fill="freeze"/>

    <rect x="50" y="300" width="120" height="55" rx="10" fill="#1a1b27" stroke="#2496ED" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="75" cy="327" r="8" fill="#2496ED">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <text x="90" y="331" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Docker</text>

    <rect x="185" y="300" width="120" height="55" rx="10" fill="#1a1b27" stroke="#326CE5" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <circle cx="210" cy="327" r="8" fill="#326CE5">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="2.2s"/>
    </circle>
    <text x="225" y="331" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Kubernetes</text>

    <rect x="320" y="300" width="120" height="55" rx="10" fill="#1a1b27" stroke="#FF9900" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <circle cx="345" cy="327" r="8" fill="#FF9900">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="2.4s"/>
    </circle>
    <text x="360" y="331" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">AWS</text>

    <rect x="455" y="300" width="120" height="55" rx="10" fill="#1a1b27" stroke="#47A248" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <circle cx="480" cy="327" r="8" fill="#47A248">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="2.6s"/>
    </circle>
    <text x="495" y="331" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">MongoDB</text>

    <rect x="590" y="300" width="120" height="55" rx="10" fill="#1a1b27" stroke="#4169E1" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <circle cx="615" cy="327" r="8" fill="#4169E1">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="2.8s"/>
    </circle>
    <text x="630" y="331" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Postgres</text>
  </g>

  <!-- Row 4: Redis, Nginx, Linux, Bash, Vim -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>

    <rect x="50" y="370" width="120" height="55" rx="10" fill="#1a1b27" stroke="#DC382D" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <circle cx="75" cy="397" r="8" fill="#DC382D">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <text x="90" y="401" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Redis</text>

    <rect x="185" y="370" width="120" height="55" rx="10" fill="#1a1b27" stroke="#009639" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <circle cx="210" cy="397" r="8" fill="#009639">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="3.2s"/>
    </circle>
    <text x="225" y="401" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Nginx</text>

    <rect x="320" y="370" width="120" height="55" rx="10" fill="#1a1b27" stroke="#FCC624" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
    <circle cx="345" cy="397" r="8" fill="#FCC624">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="3.4s"/>
    </circle>
    <text x="360" y="401" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Linux</text>

    <rect x="455" y="370" width="120" height="55" rx="10" fill="#1a1b27" stroke="#89e051" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
    <circle cx="480" cy="397" r="8" fill="#89e051">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="3.6s"/>
    </circle>
    <text x="495" y="401" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Bash</text>

    <rect x="590" y="370" width="120" height="55" rx="10" fill="#1a1b27" stroke="#019733" stroke-width="1" opacity="0.7">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="1.4s"/>
    </rect>
    <circle cx="615" cy="397" r="8" fill="#019733">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite" begin="3.8s"/>
    </circle>
    <text x="630" y="401" font-size="12" font-weight="bold" fill="#c0caf5" font-family="Segoe UI, Ubuntu, sans-serif">Vim</text>
  </g>

  <!-- Bottom connecting line -->
  <line x1="50" y1="450" x2="50" y2="450" stroke="url(#techHeaderGrad)" stroke-width="1" stroke-linecap="round" opacity="0.4">
    <animate attributeName="x2" from="50" to="750" dur="2s" begin="1.8s" fill="freeze"/>
  </line>

  <!-- Orbiting dot -->
  <circle r="3" fill="#a9fef7" opacity="0.6">
    <animateMotion dur="8s" repeatCount="indefinite" path="M50,470 Q400,490 750,470 Q400,450 50,470"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
