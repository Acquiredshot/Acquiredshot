<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%" height="120">
  <defs>
    <linearGradient id="wolfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a9fef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf91f3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Wolf running frame 1 -->
  <g fill="url(#wolfGrad)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-150,0;1250,0;-150,0" dur="12s" repeatCount="indefinite"/>
      <!-- Body -->
      <ellipse cx="50" cy="60" rx="35" ry="18" opacity="0.95"/>
      <!-- Head -->
      <ellipse cx="88" cy="48" rx="16" ry="13" opacity="0.95"/>
      <!-- Snout -->
      <ellipse cx="105" cy="52" rx="10" ry="6" opacity="0.95"/>
      <!-- Ear left -->
      <polygon points="80,38 76,20 86,36" opacity="0.95"/>
      <!-- Ear right -->
      <polygon points="88,36 84,18 94,34" opacity="0.95"/>
      <!-- Tail -->
      <path d="M15,55 Q-5,35 -10,25 Q-5,30 5,45" fill="url(#wolfGrad)" opacity="0.95"/>
      <!-- Front leg 1 -->
      <rect x="70" y="73" width="5" height="25" rx="2" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" values="15,72,73;-15,72,73;15,72,73" dur="0.4s" repeatCount="indefinite"/>
      </rect>
      <!-- Front leg 2 -->
      <rect x="78" y="73" width="5" height="25" rx="2" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" values="-15,80,73;15,80,73;-15,80,73" dur="0.4s" repeatCount="indefinite"/>
      </rect>
      <!-- Back leg 1 -->
      <rect x="28" y="73" width="5" height="25" rx="2" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" values="15,30,73;-15,30,73;15,30,73" dur="0.4s" repeatCount="indefinite"/>
      </rect>
      <!-- Back leg 2 -->
      <rect x="36" y="73" width="5" height="25" rx="2" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" values="-15,38,73;15,38,73;-15,38,73" dur="0.4s" repeatCount="indefinite"/>
      </rect>
      <!-- Eye -->
      <circle cx="95" cy="46" r="2" fill="#1a1b27"/>
      <!-- Nose -->
      <circle cx="113" cy="50" r="2.5" fill="#1a1b27"/>
    </g>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="url(#wolfGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Paw prints that fade in and out -->
  <g fill="url(#wolfGrad)" opacity="0.15">
    <circle cx="200" cy="105" r="3"><animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="107" r="3"><animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="500" cy="105" r="3"><animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="650" cy="107" r="3"><animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite" begin="3s"/></circle>
    <circle cx="800" cy="105" r="3"><animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite" begin="4s"/></circle>
    <circle cx="950" cy="107" r="3"><animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite" begin="5s"/></circle>
  </g>
</svg>
