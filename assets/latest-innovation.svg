<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1221"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="blobA" cx="22%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="88%" cy="10%" r="74%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headerStripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.018"/>
      </feComponentTransfer>
    </filter>
    <symbol id="dotIcon" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="9" fill="#0b1221"/>
      <circle cx="10" cy="10" r="4" fill="#2dd4bf"/>
    </symbol>
  </defs>

  <rect width="800" height="480" rx="22" fill="url(#bgBase)"/>
  <rect width="800" height="480" rx="22" fill="url(#blobA)"/>
  <rect width="800" height="480" rx="22" fill="url(#blobB)"/>
  <rect width="800" height="480" rx="22" fill="none" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.2"/>
  <rect x="0" y="0" width="800" height="480" rx="22" fill="#ffffff" filter="url(#grain)"/>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.05s" fill="freeze"/>
    <rect x="26" y="22" width="748" height="72" rx="18" fill="#0b1221" fill-opacity="0.55" stroke="url(#cardStroke)" stroke-width="1.3"/>
    <text x="48" y="53" font-family="Sora, Manrope, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="2.2" fill="#d1d5db">LIVE REPOSITORY PULSE</text>
    <text x="48" y="79" font-family="Sora, Manrope, Segoe UI, sans-serif" font-size="30" font-weight="800" fill="#f8fafc" filter="url(#softGlow)">Latest Innovation</text>
    <rect x="595" y="42" width="155" height="9" rx="4.5" fill="url(#headerStripe)">
      <animate attributeName="width" values="110;155;110" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(26,108)">
    <rect x="0" y="0" width="748" height="346" rx="18" fill="#0b1221" fill-opacity="0.50" stroke="#f8fafc" stroke-opacity="0.18" stroke-width="1"/>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.20s" fill="freeze"/>
      <rect x="18" y="16" width="712" height="44" rx="12" fill="#111827" fill-opacity="0.88"/>
      <use href="#dotIcon" x="30" y="28" width="20" height="20"/>
      <text x="64" y="35" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#99f6e4" letter-spacing="1.1">UPDATE SOURCE</text>
      <text x="64" y="52" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Wolf-Pak Agentic Profile Bot - March 26, 2026</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.32s" fill="freeze"/>
      <rect x="18" y="70" width="712" height="44" rx="12" fill="#111827" fill-opacity="0.88"/>
      <use href="#dotIcon" x="30" y="82" width="20" height="20"/>
      <text x="64" y="89" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fda4af" letter-spacing="1.1">TOP PROJECT</text>
      <text x="64" y="106" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Acquiredshot  Python  Stars 0</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.44s" fill="freeze"/>
      <rect x="18" y="124" width="712" height="44" rx="12" fill="#111827" fill-opacity="0.88"/>
      <use href="#dotIcon" x="30" y="136" width="20" height="20"/>
      <text x="64" y="143" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#93c5fd" letter-spacing="1.1">TOP PROJECT</text>
      <text x="64" y="160" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">wolf-pak-website  TypeScript  Stars 0</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.56s" fill="freeze"/>
      <rect x="18" y="178" width="712" height="44" rx="12" fill="#111827" fill-opacity="0.88"/>
      <use href="#dotIcon" x="30" y="190" width="20" height="20"/>
      <text x="64" y="197" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fdba74" letter-spacing="1.1">TOP PROJECT</text>
      <text x="64" y="214" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">wolf-pak-line-bot  JavaScript  Stars 0</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.68s" fill="freeze"/>
      <rect x="18" y="232" width="712" height="44" rx="12" fill="#111827" fill-opacity="0.88"/>
      <use href="#dotIcon" x="30" y="244" width="20" height="20"/>
      <text x="64" y="251" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#f9a8d4" letter-spacing="1.1">TOP PROJECT</text>
      <text x="64" y="268" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Banking-Application-Phase-3  Java  Stars 0</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.80s" fill="freeze"/>
      <rect x="18" y="286" width="712" height="44" rx="12" fill="#111827" fill-opacity="0.88"/>
      <use href="#dotIcon" x="30" y="298" width="20" height="20"/>
      <text x="64" y="305" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#86efac" letter-spacing="1.1">FOCUS</text>
      <text x="64" y="322" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Automation-first software and AI-powered systems</text>
    </g>
  </g>
</svg>
