      <rect x="30" y="265" width="740" height="70" rx="12" fill="#1a1b27" stroke="#38bdae" stroke-width="1" opacity="0.6">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="0.8s"/>
