# 🐺 Wolf-Pak Agentic Profile Updater
# Automatically scans repos, generates AI-powered summaries,
# and updates the profile README every 24 hours.

name: "🤖 Agentic Profile Update"

on:
  schedule:
    # Runs every 24 hours at 6:00 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🧠 Run Agentic Profile Updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/update_profile.py

      - name: 📝 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Wolf-Pak Agent 🐺"
          git add README.md
          git diff --staged --quiet || (git commit -m "🤖 Auto-update: AI-generated profile summary [$(date +'%Y-%m-%d')]" && git push)
